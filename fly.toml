app = "kumaushi-climate"
primary_region = "nrt"

[build]

[env]
BIND_ADDR = "0.0.0.0:3000"
KUMAUSHI_DB = "/data/kumaushi.db"

[mounts]
source = "kumaushi_data"
destination = "/data"

[[services]]
internal_port = 3000
protocol = "tcp"
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[services.concurrency]
type = "requests"
hard_limit = 200
soft_limit = 100

[[services.http_checks]]
interval = "30s"
timeout = "5s"
grace_period = "15s"
path = "/api/v1/dashboard"

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
